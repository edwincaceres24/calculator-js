<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
    <title>Calculator</title>
</head>
<style>
    * {
        font-family: 'Ubuntu';
    }

    body {
        background-color: #DD5E54;
    }

    h1 {
        color: white;
        font-size: 3em;
        text-align: center;
    }

    .main-container {
        background-color: white;
        max-width: 1000px;
        min-height: 300px;
        justify-content: center;
        margin: 0 auto;
        border-radius: 15px;
        padding: .75rem .75rem;


    }



    .container-operators {
        margin: 0.8rem 1.5rem;

        display: grid;
        grid-template-columns: 25% 25% 25% 25%;
        grid-template-rows: repeat(5, 20%);
        min-height: 15em;
        text-align: center;
    }

    .button_2rows {
        grid-column: 1/3;
    }

    .container-operators button {
        padding: 0;
        border: none;
        background: none;
        border-color: none;
        font-size: 1.15em;
    }

    button:hover {
        background: #96ddd4;
        color: white;
        font-weight: bold;
    }

    .container-result {
        margin: 0 auto;
        border-radius: 10px;
        padding: .75rem 0.5rem;
        margin: 0.25rem 0.25rem;
        background-color: #bebebe;
        text-align: center;
    }

    .container-result input {
        background-color: inherit;
        border: none;
        color: white;
        font-style: bold;
        font-size: 1.25em;
    }

    @media screen and (max-width: 350px) {
        h1 {
            font-size: 1.75em;
        }

        .main-container {
            min-height: 300px;
            background-color: yellow;
        }

        .container-result input {
            font-size: 0.75em;
            align-items: center;
        }

        .container-operators button {

            font-size: 1em;
        }
    }

    /*.container-wrapper-numbers{
      
    }
    .container-wrapper-operators{
        margin: 1rem 1.5rem;
        display: grid;
        grid-template-columns: 30%  ;
        grid-template-rows: 30%;
        min-height: 15em;
    }*/
</style>


<body>
    <div>
        <h1>Calculadora
        </h1>
        <div class="main-container">
            <div class="container-result">
                <p id="your_result">Your result</p>
            </div>
            <div class="container-operators">
                <button id="allclear" class="button_2rows">AC</button>
                <button data-operator>DEL</button>
                <button id="divide">%</button>
                <button id="number_7" name="data-number">7</button>
                <button id="number_8" name="data-number">8</button>
                <button id="number_9" name="data-number">9</button>
                <button id="multiply" name="data-operant">*</button>
                <button id="number_4" name="data-number">4</button>
                <button id="number_5" name="data-number">5</button>
                <button id="number_6"name="data-number">6</button>
                <button id="substract" name="data-operant">-</button>
                <button id="number_3" name="data-number">3</button>
                <button id="number_2" name="data-number">2</button>
                <button id="number_1" name="data-number">1</button>
                <button data-operator id="add">+</button>
                <button id="number_0" name="data-number" class="button_2rows">0</button>
                <button id="number_.">.</button>
                <button data-operator="equals">=</button>
            </div>
        </div>
    </div>
    </div>
    <script src="project_js/calculator.js"></script>
</body>


</html>
