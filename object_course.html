<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        .product{
            display: flex;
            flex-wrap: wrap;
        }
        .product-card {
            padding: 1rem;
            flex-grow: 1;
            flex-basis: 15%;
            background-color: white;
            /* display: grid;
            grid-template-columns: 25%;
            grid-template-rows: repeat(4, 25) background-color: yellow; */
        }

        .product-image {
            background-color: none;
            max-height: 170px;
        }
        .product-info{
            font-size: 1.5em;
            margin: 0;
            padding: 0;
        }
    
        .product-info h6{
            font-size: 1.5em;
            margin: inherit;
        }
        .input{
            text-align: center;
        }
        .second-question{
            background-color: rgba(0, 0, 255, 0.13);
            display: none;
        }
        .selected-input{
            background-color: red;
            display: none;
        }
        .hide-option{
            display: none;
        }
        .show-option{
            display: block;
        }
    </style>

</head>
